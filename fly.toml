# fly.toml app configuration file generated for physics-sandbox-go on 2026-06-26T12:33:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'physics-sandbox-go'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
