# Fly.io config for the physics sandbox.
#
# This app keeps one shared in-memory world, so it must run as a SINGLE
# always-on instance: do not scale to multiple machines (users would land in
# separate worlds) and do not auto-stop (that discards the simulation).
#
# Change `app` to a name unique to you, then: fly launch --copy-config --no-deploy
# (or `fly apps create <name>`), followed by `fly deploy`.

app = "physics-sandbox-go"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the single world alive; never scale past one machine.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  # SSE connections are long-lived; allow many per machine.
  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
